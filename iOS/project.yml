name: Internlog
options:
  bundleIdPrefix: com.shimondeitel.internlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Internlog:
    type: application
    platform: iOS
    sources:
      - path: Internlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.internlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Internlog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  InternlogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: InternlogTests
      - path: Internlog.storekit
    dependencies:
      - target: Internlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.internlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  InternlogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: InternlogUITests
    dependencies:
      - target: Internlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.internlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Internlog:
    build:
      targets:
        Internlog: all
        InternlogTests: [test]
        InternlogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Internlog.storekit
    test:
      config: Debug
      storeKitConfiguration: Internlog.storekit
      targets:
        - InternlogTests
        - InternlogUITests
    archive:
      config: Release
